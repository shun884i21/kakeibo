<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2a4a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d06e"/>
      <stop offset="100%" stop-color="#c8900a"/>
    </linearGradient>
    <linearGradient id="obi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c0392b"/>
      <stop offset="25%"  stop-color="#7c6b9e"/>
      <stop offset="50%"  stop-color="#2c5f8a"/>
      <stop offset="75%"  stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#e8a838"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- 背景 -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- 上下の色帯 -->
    <rect x="0" y="0"   width="512" height="14" fill="url(#obi)"/>
    <rect x="0" y="498" width="512" height="14" fill="url(#obi)"/>

    <!-- コインの円（外側） -->
    <circle cx="256" cy="264" r="170" fill="url(#gold)"/>
    <!-- コインの内側リング -->
    <circle cx="256" cy="264" r="148" fill="none" stroke="rgba(255,220,80,0.5)" stroke-width="6"/>

    <!-- ¥マーク（SVGテキスト） -->
    <text x="256" y="330"
      font-family="'Helvetica Neue', Arial, sans-serif"
      font-size="200"
      font-weight="900"
      text-anchor="middle"
      fill="rgba(100,55,5,0.85)">¥</text>

    <!-- 四隅の菱形 -->
    <text x="52"  y="82"  font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.15)">◇</text>
    <text x="460" y="82"  font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.15)">◇</text>
    <text x="52"  y="464" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.15)">◇</text>
    <text x="460" y="464" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.15)">◇</text>
  </g>
</svg>
